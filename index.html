<style>
/* ===== 家常菜点菜系统 - 清新粉白主题 ===== */
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap');
:root{
  /* 粉白配色 - 樱花粉+奶油白 */
  --primary:#E8628A;      /* 樱花粉主色 */
  --primary-light:#F093B0; /* 浅粉 */
  --primary-dark:#C94070;  /* 深粉 */
  --accent:#FF9EBD;        /* 嫩粉点缀 */
  --accent-soft:#FFF0F5;   /* 浅粉背景 */
  --bg:#FFF8FA;            /* 奶油白背景 */
  --bg2:#FFF0F5;           /* 浅粉背景 */
  --card:#FFFFFF;
  --text:#4A2535;          /* 深玫红文字 */
  --text-2:#9B7088;        /* 次要文字 */
  --text-3:#D4A8BC;        /* 三级文字 */
  --border:#F5D5E2;        /* 边框线 */
  --border-2:#EBC8D6;      /* 深边框 */
  --tag-bg:#FFF0F5;        /* 标签背景 */
  --tag-color:#E8628A;     /* 标签文字 */
  --ok:#4CAF9E;
  --err:#E8628A;
  --shadow:0 2px 12px rgba(232,98,138,.08);
  --shadow-md:0 6px 24px rgba(232,98,138,.12);
  --shadow-lg:0 14px 40px rgba(232,98,138,.18);
  --r:20px;
  --header-h:60px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:"Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;
  -webkit-font-smoothing:antialiased;
  background-image:
    radial-gradient(ellipse at 10% 5%,rgba(232,98,138,.04) 0%,transparent 45%),
    radial-gradient(ellipse at 90% 95%,rgba(255,158,189,.06) 0%,transparent 45%);
}

/* ===== HEADER ===== */
.hd{
  background:linear-gradient(135deg,#C94070 0%,#E8628A 40%,#F093B0 100%);
  color:#fff;padding:0 20px;height:var(--header-h);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:200;
  box-shadow:0 4px 24px rgba(201,64,112,.25);
  border-bottom:1px solid rgba(255,255,255,.15);
}
.hd::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to bottom,rgba(255,255,255,.08),transparent);
  pointer-events:none;
}
.hd-t{font-size:18px;font-weight:900;letter-spacing:2px;display:flex;align-items:center;gap:8px;position:relative;z-index:1}
.hd-icon{font-size:20px}
.hd-actions{display:flex;gap:8px;position:relative;z-index:1}
.cart-btn{
  background:rgba(255,255,255,.25);
  border:1.5px solid rgba(255,255,255,.5);
  color:#fff;border-radius:28px;padding:7px 14px;
  font-size:13px;cursor:pointer;
  display:flex;align-items:center;gap:6px;
  transition:all .2s ease;
  backdrop-filter:blur(8px);font-weight:700;letter-spacing:.3px;
}
.cart-btn:hover{background:rgba(255,255,255,.45);border-color:#fff;transform:translateY(-1px)}
.cart-btn:active{transform:scale(.97)}
.badge{
  background:#fff;color:var(--primary-dark);border-radius:10px;
  padding:1px 7px;font-size:11px;font-weight:900;
  min-width:20px;text-align:center;
  box-shadow:0 1px 4px rgba(0,0,0,.1);
}

/* ===== BANNER ===== */
.top-banner{
  background:linear-gradient(90deg,#C94070,#E8628A 35%,#F093B0 65%,#FFBFD2);
  color:#fff;text-align:center;padding:7px 16px;font-size:11.5px;
  letter-spacing:1.5px;font-weight:600;
  position:sticky;top:var(--header-h);z-index:195;
}

/* ===== FILTER BAR ===== */
.fb{
  background:rgba(255,255,255,.97);
  border-bottom:1px solid var(--border);
  padding:10px 16px;
  position:sticky;top:calc(var(--header-h) + 33px);z-index:190;
  backdrop-filter:blur(16px);
}
.sr{display:flex;gap:8px;margin-bottom:9px}
.si{
  flex:1;border:1.5px solid var(--border);border-radius:24px;
  padding:8px 16px;font-size:13px;outline:none;
  transition:all .2s;background:#fff;color:var(--text);
  font-family:inherit;
}
.si:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(232,98,138,.1)}
.si::placeholder{color:var(--text-3)}
.fs{
  border:1.5px solid var(--border);border-radius:24px;
  padding:8px 12px;font-size:12px;outline:none;
  cursor:pointer;background:#fff;color:var(--text);
  font-family:inherit;transition:all .2s;
}
.fs:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(232,98,138,.1)}
.ct{display:flex;gap:6px;overflow-x:auto;padding-bottom:3px}
.ct::-webkit-scrollbar{display:none}
.ctb{
  white-space:nowrap;border:1.5px solid var(--border);border-radius:22px;
  padding:5px 15px;font-size:12px;cursor:pointer;
  background:#fff;transition:all .2s;color:var(--text-2);font-weight:600;
}
.ctb.on{
  background:linear-gradient(135deg,var(--primary-dark),var(--primary));
  border-color:transparent;color:#fff;font-weight:700;
  box-shadow:0 3px 12px rgba(232,98,138,.3);
  transform:translateY(-1px);
}
.ctb:hover:not(.on){border-color:var(--primary);color:var(--primary);background:var(--bg2)}

/* ===== MAIN CONTENT ===== */
.main{max-width:1300px;margin:0 auto;padding:20px 16px}
.main-head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;padding-bottom:12px;
  border-bottom:2px solid var(--border);
}
.main-title{font-size:15px;font-weight:800;color:var(--primary-dark);display:flex;align-items:center;gap:8px;letter-spacing:.5px}
.main-title-icon{font-size:18px}
.main-count{
  font-size:12px;color:var(--text-2);
  background:var(--tag-bg);border:1px solid var(--border-2);
  border-radius:20px;padding:3px 12px;font-weight:600;
}

/* ===== CARD GRID ===== */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(190px,1fr));
  gap:16px;align-content:start;min-height:60vh;
}
.card{
  background:var(--card);border-radius:var(--r);
  box-shadow:var(--shadow);cursor:pointer;
  transition:transform .24s cubic-bezier(.34,1.4,.64,1),box-shadow .24s;
  overflow:hidden;display:flex;flex-direction:column;
  border:1px solid var(--border);position:relative;
}
.card:hover{transform:translateY(-8px) scale(1.02);box-shadow:var(--shadow-lg)}
.card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,240,245,.3),transparent 50%);
  opacity:0;transition:opacity .3s;pointer-events:none;z-index:1;
}
.card:hover::before{opacity:1}

/* 卡片顶部粉条 - 增强版流动渐变 */
.card-stripe{
  height:5px;
  background:linear-gradient(90deg,var(--primary-dark),var(--primary),var(--primary-light),#FFBFD2,#FF9EBD,var(--primary));
  background-size:300% 100%;
  animation:stripeFlow 3s linear infinite;
  flex-shrink:0;
}
@keyframes stripeFlow{0%{background-position:0% 0%}100%{background-position:300% 0%}}
.card:hover .card-stripe{animation:stripeFlow 1s linear infinite}

/* 卡片图片区域 - 简洁的 Emoji 展示 */
.card-img{
  background:linear-gradient(145deg,#FFF5F8 0%,#FFF0F5 40%,#FCEEF3 70%,#FFF8FA 100%);
  height:100px;display:flex;align-items:center;justify-content:center;
  font-size:64px;position:relative;
  border-bottom:1px solid var(--border-2);
  overflow:hidden;
}
.card-img span{
  position:relative;
  z-index:2;
  filter:drop-shadow(0 3px 6px rgba(0,0,0,.08));
  transition:transform .3s ease;
  line-height:1;
}
.card:hover .card-img span:not(.card-badge){transform:scale(1.15) rotate(-3deg)}
.card-img::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:30px;
  background:linear-gradient(to top,rgba(255,248,250,.98),transparent);
  z-index:3;
}

/* 角标动画 - 弹跳效果 */
.card-badge{
  position:absolute;top:10px;right:10px;
  font-size:10px;font-weight:800;letter-spacing:.5px;
  border-radius:10px;padding:3px 9px;
  box-shadow:0 3px 12px rgba(0,0,0,.15);z-index:3;
  animation:badgePulse 2s ease-in-out infinite;
}
@keyframes badgePulse{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.05)}
}
.card:hover .card-badge{animation:badgeBounce .4s ease}
@keyframes badgeBounce{
  0%{transform:scale(1)}
  30%{transform:scale(1.15)}
  60%{transform:scale(.95)}
  100%{transform:scale(1)}
}
.card-badge.hot{background:linear-gradient(135deg,#FF6B8A,#E8628A);color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.2)}
.card-badge.new{background:linear-gradient(135deg,#4CAF9E,#3D9B84);color:#fff}
.card-badge.pop{background:linear-gradient(135deg,#FFBFD2,#F093B0);color:#C94070}

.card-body{padding:10px 12px 6px;flex:1;display:flex;flex-direction:column;gap:2px}
.card-name{
  font-size:14px;font-weight:700;color:var(--text);line-height:1.4;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.card-cat{font-size:11px;color:var(--text-3);font-weight:500;margin-top:1px}
.card-desc{font-size:11px;color:var(--text-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px}
.card-tag{
  font-size:10px;background:var(--tag-bg);color:var(--tag-color);
  border-radius:8px;padding:3px 9px;
  display:inline-block;margin-top:6px;font-weight:600;
  border:1px solid rgba(232,98,138,.15);
  transition:all .2s;
}
.card:hover .card-tag{transform:translateX(2px)}
.card-foot{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:auto;padding:8px 12px 10px;
  border-top:1px solid var(--border-2);
}
.price-wrap{display:flex;align-items:baseline;gap:2px}
.price{font-size:20px;font-weight:900;color:var(--primary);line-height:1;position:relative}
.price::before{
  content:'¥';
  font-size:12px;
  margin-right:2px;
  opacity:.7;
}
.price-unit{font-size:11px;color:var(--text-3);font-weight:500;margin-left:1px}
.add-btn{
  background:linear-gradient(135deg,var(--primary-dark),var(--primary));
  color:#fff;border:none;border-radius:20px;
  padding:6px 14px;font-size:12px;font-weight:800;
  cursor:pointer;transition:all .18s;
  box-shadow:0 3px 10px rgba(232,98,138,.3);
  letter-spacing:.3px;
  position:relative;overflow:hidden;
}
.add-btn::before{
  content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);
  transition:left .5s;
}
.add-btn:hover::before{left:100%}
.add-btn:hover{
  background:linear-gradient(135deg,var(--primary),var(--primary-light));
  box-shadow:0 4px 16px rgba(232,98,138,.4);
  transform:translateY(-1px) scale(1.04);
}
.add-btn:active{transform:scale(.95)}
.empty{
  grid-column:1/-1;text-align:center;padding:70px 0;
  color:var(--text-2);font-size:14px;
  display:flex;flex-direction:column;align-items:center;gap:12px;
}
.empty-icon{font-size:56px;opacity:.3}

/* ===== MODAL ===== */
.ov{position:fixed;inset:0;background:rgba(74,37,53,.5);z-index:400;display:none;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(6px)}
.ov.open{display:flex}
.modal{
  background:#fff;border-radius:22px;max-width:540px;width:100%;
  max-height:90vh;overflow-y:auto;
  animation:mup .28s cubic-bezier(.34,1.4,.64,1);
  box-shadow:0 24px 80px rgba(201,64,112,.2);
}
@keyframes mup{from{transform:translateY(32px) scale(.94);opacity:0}to{transform:none;opacity:1}}
.modal-hd{
  padding:18px 20px 14px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  background:linear-gradient(to bottom,var(--bg2),#fff);
}
.modal-title{font-size:17px;font-weight:800;color:var(--text);letter-spacing:.3px}
.modal-close{
  background:var(--bg2);border:none;
  width:32px;height:32px;border-radius:50%;
  cursor:pointer;color:var(--text-2);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;transition:all .15s;flex-shrink:0;
}
.modal-close:hover{background:var(--primary);color:#fff}
.modal-body{padding:18px 20px}
.meta-row{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
.mc{
  background:var(--tag-bg);border-radius:10px;
  padding:4px 11px;font-size:12px;font-weight:600;
  color:var(--tag-color);border:1px solid rgba(232,98,138,.12);
}
.st{font-size:11px;font-weight:800;color:var(--text-2);margin:14px 0 8px;letter-spacing:2px;text-transform:uppercase}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{border-radius:8px;padding:4px 10px;font-size:11px;font-weight:600}
.chip.I{background:var(--tag-bg);color:var(--tag-color)}
.chip.S{background:#e0f2fe;color:#0369a1}
.nut{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:10px}
.nut-item{
  background:linear-gradient(145deg,var(--bg2),#fff);
  border-radius:14px;padding:10px 4px;text-align:center;
  border:1px solid var(--border);
}
.nut-v{font-size:16px;font-weight:900;color:var(--primary)}
.nut-k{font-size:10px;color:var(--text-3);margin-top:2px;font-weight:500}

/* ===== CART DRAWER ===== */
.cart-ov{position:fixed;inset:0;z-index:500;display:none}
.cart-ov.open{display:block}
.cart-bg{position:absolute;inset:0;background:rgba(74,37,53,.5);backdrop-filter:blur(6px)}
.cart-drawer{
  position:absolute;right:0;top:0;bottom:0;width:min(420px,100vw);
  background:#fff;
  box-shadow:-12px 0 48px rgba(201,64,112,.2);
  display:flex;flex-direction:column;
  animation:sin .32s cubic-bezier(.34,1.4,.64,1);
}
@keyframes sin{from{transform:translateX(100%)}to{transform:none}}
.cart-hd{
  padding:18px 20px;
  border-bottom:1px solid var(--border);
  font-size:17px;font-weight:800;
  display:flex;align-items:center;justify-content:space-between;
  color:var(--text);
  background:linear-gradient(135deg,var(--bg2),#fff);
}
.cart-items{flex:1;overflow-y:auto;padding:12px 16px}
.ci{
  display:flex;align-items:center;gap:10px;
  padding:11px 10px;border-radius:14px;margin-bottom:6px;
  background:#fff;border:1px solid var(--border);
  transition:box-shadow .15s;
}
.ci:hover{box-shadow:var(--shadow)}
.ci-img{width:40px;height:40px;background:var(--bg2);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.ci-name{flex:1;font-size:14px;font-weight:700;color:var(--text)}
.ci-price{font-size:14px;color:var(--primary);font-weight:900;min-width:52px;text-align:right}
.qty-ctrl{display:flex;align-items:center;gap:6px}
.qb{
  background:var(--bg2);border:1.5px solid var(--border);
  border-radius:50%;width:28px;height:28px;
  cursor:pointer;font-size:16px;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;color:var(--primary);font-weight:700;
}
.qb:hover{border-color:var(--primary);background:var(--primary);color:#fff}
.qty-n{font-size:14px;font-weight:900;min-width:20px;text-align:center;color:var(--text)}
.cart-ft{
  padding:16px 18px;
  border-top:1px solid var(--border);
  background:linear-gradient(to top,rgba(255,240,245,.8),#fff);
}
.cart-total{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:14px;font-size:15px;font-weight:700;color:var(--text);
}
.total-price{color:var(--primary);font-size:22px;font-weight:900}
.order-btn{
  width:100%;
  background:linear-gradient(135deg,var(--primary-dark),var(--primary),var(--primary-light));
  background-size:200% 100%;
  color:#fff;border:none;border-radius:28px;padding:15px;
  font-size:16px;font-weight:800;cursor:pointer;
  transition:all .25s;letter-spacing:.5px;margin-bottom:10px;
  box-shadow:0 6px 20px rgba(232,98,138,.35);
}
.order-btn:hover{
  background-position:100% 0;
  box-shadow:0 8px 28px rgba(232,98,138,.5);
  transform:translateY(-2px);
}
.order-btn:active{transform:scale(.98)}
.clear-btn{
  width:100%;background:none;border:1.5px solid var(--border);
  border-radius:24px;padding:10px;font-size:13px;
  cursor:pointer;color:var(--text-2);transition:all .15s;font-weight:600;
}
.clear-btn:hover{border-color:var(--primary);color:var(--primary)}
.cart-empty{text-align:center;padding:50px 0;color:var(--text-3);display:flex;flex-direction:column;align-items:center;gap:10px}

/* ===== ADMIN MODAL ===== */
.admin-ov{position:fixed;inset:0;background:rgba(74,37,53,.5);z-index:600;display:none;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(6px)}
.admin-ov.open{display:flex}
.admin-modal{
  background:#fff;border-radius:22px;max-width:520px;width:100%;
  max-height:92vh;overflow-y:auto;
  animation:mup .28s cubic-bezier(.34,1.4,.64,1);
  box-shadow:0 24px 80px rgba(201,64,112,.2);
}
.admin-hd{
  padding:18px 20px 14px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(to bottom,var(--bg2),#fff);
}
.admin-hd h2{font-size:16px;font-weight:800;color:var(--text)}
.admin-body{padding:16px 18px}
.form-row{margin-bottom:14px}
.form-row label{display:block;font-size:11px;font-weight:700;margin-bottom:5px;color:var(--text-2);letter-spacing:1px;text-transform:uppercase}
.form-row input,.form-row select,.form-row textarea{
  width:100%;border:1.5px solid var(--border);border-radius:12px;
  padding:9px 14px;font-size:13px;outline:none;
  transition:border .2s,box-shadow .2s;font-family:inherit;
  background:#fff;color:var(--text);
}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(232,98,138,.1)}
.form-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-btn-row{display:flex;gap:10px;margin-top:16px}
.fb-save{
  flex:1;background:linear-gradient(135deg,var(--primary-dark),var(--primary));
  color:#fff;border:none;border-radius:22px;padding:12px;
  font-size:14px;font-weight:800;cursor:pointer;
  box-shadow:0 4px 14px rgba(232,98,138,.3);transition:all .2s;
}
.fb-save:hover{box-shadow:0 6px 20px rgba(232,98,138,.45);transform:translateY(-1px)}
.fb-cancel{
  background:#fff;border:1.5px solid var(--border);border-radius:22px;
  padding:12px 18px;font-size:14px;cursor:pointer;color:var(--text-2);
  font-weight:600;transition:all .15s;
}
.fb-cancel:hover{border-color:var(--primary);color:var(--primary)}

/* ===== TOAST ===== */
.toast{
  position:fixed;bottom:30px;left:50%;
  transform:translateX(-50%) translateY(80px);
  background:linear-gradient(135deg,#C94070,#E8628A);
  color:#fff;padding:11px 26px;border-radius:28px;
  font-size:13px;font-weight:700;z-index:9999;opacity:0;
  transition:all .32s cubic-bezier(.34,1.4,.64,1);
  white-space:nowrap;box-shadow:0 6px 28px rgba(201,64,112,.3);
  display:flex;align-items:center;gap:8px;
  letter-spacing:.3px;
}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* ===== ORDER CONFIRM ===== */
.order-confirm{
  position:fixed;inset:0;background:rgba(74,37,53,.55);z-index:700;
  display:none;align-items:center;justify-content:center;padding:20px;
  backdrop-filter:blur(8px);
}

.s-bg-layer{position:absolute;inset:0;pointer-events:none}

.s-orb:nth-child(1){width:500px;height:500px;background:#E8628A;top:-120px;left:-120px;animation-duration:8s}
.s-orb:nth-child(2){width:420px;height:420px;background:#F093B0;bottom:-80px;right:-100px;animation-duration:10s}

.s-food:nth-child(2){top:18%;right:10%;font-size:28px;animation-duration:8s;animation-delay:1s}
.s-food:nth-child(3){top:65%;left:6%;font-size:30px;animation-duration:7s;animation-delay:.5s}
.s-food:nth-child(4){top:70%;right:8%;font-size:34px;animation-duration:9s;animation-delay:2s}
.s-food:nth-child(5){top:40%;left:4%;font-size:24px;animation-duration:11s;animation-delay:3s}
.s-food:nth-child(6){top:30%;right:5%;font-size:26px;animation-duration:6.5s;animation-delay:1.5s}
.s-food:nth-child(7){bottom:15%;left:20%;font-size:22px;animation-duration:10s;animation-delay:2.5s}

// ==================== SPLASH V2 ====================
(function initSplash(){
  // 数字滚动动画
  const counters = document.querySelectorAll('.s-counter[data-target]');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if(entry.isIntersecting){
        const el = entry.target;
        const target = parseInt(el.dataset.target);
        const duration = 1600;
        const start = performance.now();
        function tick(now){
          const elapsed = now - start;
          const progress = Math.min(elapsed / duration, 1);
          // easeOutExpo
          const eased = progress === 1 ? 1 : 1 - Math.pow(2, -10 * progress);
          el.textContent = Math.round(eased * target);
          if(progress < 1) requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);
        observer.unobserve(el);
      }
    });
  }, {threshold: 0.3});

  counters.forEach(c => observer.observe(c));
})();

function enterApp(){
  const splash = document.getElementById('splash');
  splash.classList.add('hide');
  splash.addEventListener('animationend', ()=>{
    splash.style.display='none';
  },{once:true});
}

let CUSTOM = JSON.parse(localStorage.getItem('custom_dishes')||'[]');
let CART = JSON.parse(localStorage.getItem('cart')||'[]');
let curCat = '全部';
let detailDish = null;

function allDishes(){ return [...BASE_DISHES, ...CUSTOM]; }

// ===== EMOJI =====
const CAT_EMOJI = {
  '蛋类':'🥚','猪肉类':'🐷','鸡肉类':'🐔','牛肉类':'🐄','羊肉类':'🐑',
  '鱼虾类':'🐟','豆腐类':'🧊','蔬菜类':'🥬','凉菜类':'🥗','汤类':'🍲',
  '主食类':'🍚','其他':'🍽️'
};
function emo(cat){ return `<span>${CAT_EMOJI[cat]||'🍽️'}</span>`; }
// ===== INIT =====
function init(){
  buildCatTabs();
  render();
  updateCartBadge();
}

function buildCatTabs(){
  const cats = ['全部',...new Set(allDishes().map(d=>d.cat).filter(Boolean))].sort((a,b)=>a==='全部'?-1:0);
  const el = document.getElementById('cat-tabs');
  el.innerHTML = cats.map(c=>`<button class="ctb${c===curCat?' on':''}" onclick="setCat('${c}')">${c==='全部'?'🍽️ 全部':emo(c)+' '+c}</button>`).join('');
}

function setCat(c){
  curCat = c;
  buildCatTabs();
  render();
}

function render(){
  const q = document.getElementById('search').value.trim().toLowerCase();
  const diff = document.getElementById('diff-sel').value;
  const scene = document.getElementById('scene-sel').value;
  let list = allDishes();
  if(curCat!=='全部') list = list.filter(d=>d.cat===curCat);
  if(q) list = list.filter(d=>(d.name||'').toLowerCase().includes(q)||(d.desc||'').toLowerCase().includes(q)||(d.tag||'').toLowerCase().includes(q));
  if(diff) list = list.filter(d=>d.diff===diff);
  if(scene) list = list.filter(d=>d.scene===scene);
  const grid = document.getElementById('dish-grid');
  // 更新菜品计数
  document.getElementById('dish-count').textContent = `共 ${list.length} 道菜品`;
  if(!list.length){
    grid.innerHTML='<div class="empty"><div class="empty-icon">🍳</div><div>没有找到相关菜品</div><div style="font-size:12px;margin-top:4px">试试调整筛选条件</div></div>';
    return;
  }
  grid.innerHTML = list.map(d=>cardHTML(d)).join('');
}

function cardHTML(d){
  const ci = CART.find(c=>c.id===d.id);
  const inCart = ci ? `<span style="font-size:11px;color:var(--primary);font-weight:700">已点 ${ci.qty} 份</span>` : '';
  // 随机给一些菜品加徽章
  const hash = d.id.split('').reduce((a,c)=>a+c.charCodeAt(0),0);
  const badge = hash%5===0 ? '<span class="card-badge hot">🔥人气</span>' :
                hash%7===0 ? '<span class="card-badge new">✨新品</span>' :
                hash%3===0 ? '<span class="card-badge pop">⭐推荐</span>' : '';
  return `<div class="card" onclick="openDetail('${d.id}')">
    <div class="card-stripe"></div>
    <div class="card-img">${emo(d.cat)}${badge}</div>
    <div class="card-body">
      <div class="card-name">${d.name}</div>
      <div class="card-cat">${d.cat||''}</div>
      <div class="card-desc">${d.desc||''}</div>
      ${d.tag?`<div class="card-tag">${d.tag}</div>`:''}
      <div class="card-foot">
        <div class="price-wrap"><span class="price">¥${d.price||0}</span><span class="price-unit">/份</span></div>
        <div style="display:flex;align-items:center;gap:6px">
          ${inCart}
          <button class="add-btn" onclick="event.stopPropagation();addToCart('${d.id}')">+加入</button>
        </div>
      </div>
    </div>
  </div>`;
}

// ===== DETAIL =====
function openDetail(id){
  detailDish = allDishes().find(d=>d.id===id);
  if(!detailDish) return;
  const d = detailDish;
  document.getElementById('d-name').textContent = emo(d.cat)+' '+d.name;
  document.getElementById('d-cat').textContent = d.cat;
  document.getElementById('d-meta').innerHTML = [
    d.diff?`<span class="mc">⚡ ${d.diff}</span>`:'',
    d.time?`<span class="mc">⏱️ ${d.time}分钟</span>`:'',
    d.price?`<span class="mc">💰 ¥${d.price}</span>`:'',
    d.scene?`<span class="mc">📍 ${d.scene}</span>`:'',
  ].join('');
  const ings = (d.ingredients||[]);
  document.getElementById('d-chips').innerHTML = ings.length
    ? ings.map(i=>`<span class="chip ${i.type&&i.type.startsWith('S')?'S':'I'}">${i.name} ${i.qty||''}${i.unit||''}</span>`).join('')
    : '<span style="color:var(--sub);font-size:12px">暂无食材信息</span>';
  document.getElementById('d-nut').innerHTML = [
    ['热量','kcal',d.kcal],['蛋白质','g',d.protein],['脂肪','g',d.fat],['碳水','g',d.carb]
  ].map(([k,u,v])=>`<div class="nut-item"><div class="nut-v">${v||0}</div><div class="nut-k">${k}(${u})</div></div>`).join('');
  document.getElementById('d-scene-tag').innerHTML = d.tag?`<div style="font-size:12px;background:var(--tagbg);color:var(--tagc);border-radius:10px;padding:5px 12px;display:inline-block">${d.tag}</div>`:'';
  document.getElementById('detail-ov').classList.add('open');
}
function closeDetail(){ document.getElementById('detail-ov').classList.remove('open'); }
function addFromDetail(){
  if(detailDish){ addToCart(detailDish.id); closeDetail(); }
}

// ===== CART =====
function addToCart(id){
  const d = allDishes().find(x=>x.id===id);
  if(!d) return;
  const idx = CART.findIndex(c=>c.id===id);
  if(idx>=0) CART[idx].qty++;
  else CART.push({id,name:d.name,price:d.price||0,qty:1});
  saveCart(); updateCartBadge(); render();
  showToast(`✅ "${d.name}" 已加入购物车`);
}
function changeQty(id,delta){
  const idx = CART.findIndex(c=>c.id===id);
  if(idx<0) return;
  CART[idx].qty += delta;
  if(CART[idx].qty<=0) CART.splice(idx,1);
  saveCart(); updateCartBadge(); renderCart(); render();
}
function clearCart(){
  if(!confirm('确定清空购物车吗？')) return;
  CART = []; saveCart(); updateCartBadge(); renderCart(); render();
}
function saveCart(){ localStorage.setItem('cart', JSON.stringify(CART)); }
function updateCartBadge(){
  const n = CART.reduce((a,c)=>a+c.qty,0);
  document.getElementById('cart-count').textContent = n;
}
function openCart(){ renderCart(); document.getElementById('cart-ov').classList.add('open'); }
function closeCart(){ document.getElementById('cart-ov').classList.remove('open'); }
function renderCart(){
  const el = document.getElementById('cart-items');
  if(!CART.length){ el.innerHTML='<div class="cart-empty"><div style="font-size:48px;margin-bottom:8px">🍽️</div><div>餐盘还是空的</div><div style="font-size:12px;margin-top:4px;color:var(--text-3)">快去选几道美味吧！</div></div>'; document.getElementById('cart-total').textContent='¥0'; return; }
  el.innerHTML = CART.map(c=>`<div class="ci">
    <div class="ci-img">${emo(c.cat)}</div>
    <div class="ci-name">${c.name}</div>
    <div class="qty-ctrl">
      <button class="qb" onclick="changeQty('${c.id}',-1)">−</button>
      <span class="qty-n">${c.qty}</span>
      <button class="qb" onclick="changeQty('${c.id}',1)">＋</button>
    </div>
    <div class="ci-price">¥${(c.price*c.qty).toFixed(1)}</div>
  </div>`).join('');
  const total = CART.reduce((a,c)=>a+c.price*c.qty,0);
  document.getElementById('cart-total').textContent = '¥'+total.toFixed(1);
}
function submitOrder(){
  if(!CART.length){ showToast('购物车是空的！'); return; }
  const total = CART.reduce((a,c)=>a+c.price*c.qty,0);
  const n = CART.reduce((a,c)=>a+c.qty,0);
  // Build order object
  const order = {
    items: CART.map(c=>({id:c.id, name:c.name, price:c.price, qty:c.qty})),
    total: total,
    count: n,
    status: 'new',
    createdAt: Date.now(),
    deviceId: MY_DEVICE_ID  // 绑定设备ID，保护数据隐私
  };
  // Write to Firebase
  const orderRef = DB.ref('orders').push(order);
  const orderId = orderRef.key;
  // Save to local history
  const localOrder = Object.assign({localId: orderId.slice(-6).toUpperCase()}, order);
  MY_ORDERS.unshift(localOrder);
  if(MY_ORDERS.length > 50) MY_ORDERS = MY_ORDERS.slice(0, 50);
  localStorage.setItem('my_orders', JSON.stringify(MY_ORDERS));
  updateOrderCountBadge();
  // Show confirmation with items
  document.getElementById('oc-items').innerHTML =
    CART.map(c=>`<div class="oc-item"><span class="oc-item-name">${c.name}</span><span class="oc-item-info">×${c.qty}  ¥${(c.price*c.qty).toFixed(1)}</span></div>`).join('')
    + `<div class="oc-items-total">合计：¥${total.toFixed(1)}（${n}份）</div>`;
  document.getElementById('oc-sub').innerHTML = `<span style="font-size:11px;color:var(--sub)">已发送给厨房，请稍等～</span><br><span style="font-size:11px;color:var(--sub)">订单号：${orderId.slice(-6).toUpperCase()}</span>`;
  CART=[]; saveCart(); updateCartBadge(); renderCart(); render();
  closeCart();
  document.getElementById('order-confirm').classList.add('open');
}
function closeOrderConfirm(){ document.getElementById('order-confirm').classList.remove('open'); }

// ===== MY ORDERS =====
let MY_ORDERS = JSON.parse(localStorage.getItem('my_orders') || '[]');

// 设备唯一标识，保护数据隐私
let MY_DEVICE_ID = localStorage.getItem('device_id');
if(!MY_DEVICE_ID){
  MY_DEVICE_ID = 'D' + Date.now().toString(36) + Math.random().toString(36).substr(2, 9);
  localStorage.setItem('device_id', MY_DEVICE_ID);
}

function updateOrderCountBadge(){
  const n = MY_ORDERS.length;
  document.getElementById('order-count').textContent = n;
}
function openMyOrders(){
  // 每次打开时从Firebase获取最新状态（只同步本设备的订单）
  DB.ref('orders').once('value').then(snap => {
    const fbOrders = snap.val() || {};
    
    // 更新本地订单状态（只处理本设备的订单）
    let updated = false;
    Object.entries(fbOrders).forEach(([orderId, order]) => {
      // 安全检查：只处理属于本设备的订单
      if(order.deviceId !== MY_DEVICE_ID) return;
      
      const localId = orderId.slice(-6).toUpperCase();
      const idx = MY_ORDERS.findIndex(o => o.localId === localId);
      if(idx !== -1 && MY_ORDERS[idx].status !== order.status){
        MY_ORDERS[idx].status = order.status;
        updated = true;
        console.log('[Firebase] 同步订单 #' + localId + ' 状态: ' + order.status);
      }
    });
    
    if(updated){
      localStorage.setItem('my_orders', JSON.stringify(MY_ORDERS));
      updateOrderCountBadge();
    }
    
    // 渲染订单列表
    renderMyOrders();
    document.getElementById('my-orders').classList.add('open');
  }).catch(err => {
    console.error('[Firebase] 获取订单失败:', err);
    renderMyOrders();
    document.getElementById('my-orders').classList.add('open');
  });
}
function closeMyOrders(){
  document.getElementById('my-orders').classList.remove('open');
}
function timeStr(ts){
  const d = new Date(ts);
  const mo = d.getMonth()+1;
  const day = d.getDate();
  const h = String(d.getHours()).padStart(2,'0');
  const m = String(d.getMinutes()).padStart(2,'0');
  return `${mo}/${day} ${h}:${m}`;
}
function renderMyOrders(){
  const el = document.getElementById('my-orders-list');
  if(!MY_ORDERS.length){
    el.innerHTML = '<div class="my-orders-empty"><div style="font-size:52px;opacity:.3">📋</div><div>暂无订单记录</div><div style="font-size:12px">下完单会显示在这里哦</div></div>';
    return;
  }
  el.innerHTML = MY_ORDERS.map(o=>`
    <div class="oh-card">
      <div class="oh-hd">
        <div class="oh-id">#${o.localId}</div>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="oh-time">${timeStr(o.createdAt)}</div>
          <div class="oh-badge ${o.status}">${{new:'待制作',accepted:'制作中',completed:'已完成'}[o.status]||'待制作'}</div>
        </div>
      </div>
      <div class="oh-items">
        ${(o.items||[]).map(i=>`<div class="oh-item"><div class="oh-qty">×${i.qty}</div><div class="oh-name">${i.name}</div><div class="oh-price">¥${(i.price*i.qty).toFixed(1)}</div></div>`).join('')}
      </div>
      <div class="oh-ft"><div class="oh-total">合计 ¥${(o.total||0).toFixed(1)} · ${o.count||0}份</div></div>
    </div>
  `).join('');
}
updateOrderCountBadge();

// ===== ADMIN =====
function openAdmin(id){
  document.getElementById('del-btn').style.display='none';
  document.getElementById('admin-title').textContent = id?'✏️ 编辑菜品':'➕ 添加新菜品';
  if(id){
    const d = CUSTOM.find(x=>x.id===id)||BASE_DISHES.find(x=>x.id===id);
    if(!d) return;
    document.getElementById('f-id').value = d.id;
    document.getElementById('f-name').value = d.name||'';
    document.getElementById('f-cat').value = d.cat||'其他';
    document.getElementById('f-price').value = d.price||'';
    document.getElementById('f-time').value = d.time||'';
    document.getElementById('f-diff').value = d.diff||'简单';
    document.getElementById('f-kcal').value = d.kcal||'';
    document.getElementById('f-scene').value = d.scene||'';
    document.getElementById('f-tag').value = d.tag||'';
    document.getElementById('f-desc').value = d.desc||'';
    if(CUSTOM.find(x=>x.id===id)) document.getElementById('del-btn').style.display='block';
  } else {
    ['f-id','f-name','f-price','f-time','f-kcal','f-tag','f-desc'].forEach(i=>document.getElementById(i).value='');
    document.getElementById('f-cat').value='其他';
    document.getElementById('f-diff').value='简单';
    document.getElementById('f-scene').value='';
  }
  document.getElementById('admin-ov').classList.add('open');
}
function closeAdmin(){ document.getElementById('admin-ov').classList.remove('open'); }
function saveDish(){
  const name = document.getElementById('f-name').value.trim();
  if(!name){ showToast('请输入菜品名称'); return; }
  const id = document.getElementById('f-id').value || ('C'+Date.now());
  const dish = {
    id, name,
    cat: document.getElementById('f-cat').value,
    price: parseFloat(document.getElementById('f-price').value)||0,
    time: parseFloat(document.getElementById('f-time').value)||0,
    diff: document.getElementById('f-diff').value,
    kcal: parseFloat(document.getElementById('f-kcal').value)||0,
    scene: document.getElementById('f-scene').value,
    tag: document.getElementById('f-tag').value.trim(),
    desc: document.getElementById('f-desc').value.trim(),
    ingredients: [],
    protein:0, fat:0, carb:0, cost:0, profit:0
  };
  const idx = CUSTOM.findIndex(x=>x.id===id);
  if(idx>=0) CUSTOM[idx]=dish;
  else CUSTOM.push(dish);
  localStorage.setItem('custom_dishes',JSON.stringify(CUSTOM));
  closeAdmin(); buildCatTabs(); render();
  showToast(`✅ "${name}" 已保存`);
}
function deleteDish(){
  const id = document.getElementById('f-id').value;
  if(!id||!confirm('确定删除这道菜吗？')) return;
  CUSTOM = CUSTOM.filter(x=>x.id!==id);
  localStorage.setItem('custom_dishes',JSON.stringify(CUSTOM));
  closeAdmin(); buildCatTabs(); render();
  showToast('🗑️ 菜品已删除');
}

// ===== TOAST =====
let toastTimer;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'),2200);
}

// ===== FIREBASE REAL-TIME ORDER SYNC =====
function syncMyOrders(){
  // 监听Firebase中订单状态变化（只同步本设备的订单）
  DB.ref('orders').on('child_changed', (snap) => {
    const changedOrder = snap.val();
    const orderId = snap.key;
    const localId = orderId.slice(-6).toUpperCase();
    
    // 安全检查：只处理属于本设备的订单
    if(changedOrder.deviceId !== MY_DEVICE_ID) return;
    
    // 查找本地订单并更新状态
    const idx = MY_ORDERS.findIndex(o => o.localId === localId);
    console.log('[Firebase Sync] 订单变化 #' + localId + ' 新状态: ' + changedOrder.status + ', 本地索引: ' + idx);
    
    if(idx !== -1 && MY_ORDERS[idx].status !== changedOrder.status){
      MY_ORDERS[idx].status = changedOrder.status;
      MY_ORDERS[idx].updatedAt = Date.now(); // 标记更新时间
      localStorage.setItem('my_orders', JSON.stringify(MY_ORDERS));
      updateOrderCountBadge();
      
      // 如果"我的订单"面板已打开，刷新显示
      const myOrdersPanel = document.getElementById('my-orders');
      if(myOrdersPanel && myOrdersPanel.classList.contains('open')){
        renderMyOrders();
      }
      
      console.log('✅ 订单 #' + localId + ' 状态已更新为: ' + changedOrder.status);
    }
  });
}

// 启动Firebase同步
syncMyOrders();

// ===== START =====
init();
</script>
