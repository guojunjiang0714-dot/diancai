<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🍽️ 后厨管理台 - 家常菜点菜系统</title>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyAk4p8G0esWi2-OXyKKxXq_eYPAsgu1adY",
  authDomain: "ordering-and-billing-sys-bc4f3.firebaseapp.com",
  databaseURL: "https://ordering-and-billing-sys-bc4f3-default-rtdb.firebaseio.com",
  projectId: "ordering-and-billing-sys-bc4f3",
  storageBucket: "ordering-and-billing-sys-bc4f3.firebasestorage.app",
  messagingSenderId: "500763684423",
  appId: "1:500763684423:web:70dbe25fef00a99a504b62"
};
firebase.initializeApp(firebaseConfig);
const DB = firebase.database();
</script>
<style>
/* ===== 后厨管理台 - 清新粉白版 ===== */
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap');
:root{
  --primary:#E8628A;
  --primary-light:#F093B0;
  --primary-dark:#C94070;
  --accent:#FF9EBD;
  --bg:#FFF8FA;
  --bg2:#FFF0F5;
  --card:#FFFFFF;
  --text:#4A2535;
  --text-2:#9B7088;
  --text-3:#D4A8BC;
  --border:#F5D5E2;
  --border-2:#EBC8D6;
  --ok:#4CAF9E;
  --sh:0 2px 12px rgba(232,98,138,.08);
  --sh2:0 6px 24px rgba(232,98,138,.12);
  --r:20px;
  --header-h:60px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:"Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;
  -webkit-font-smoothing:antialiased;
  background-image:
    radial-gradient(ellipse at 10% 5%,rgba(232,98,138,.04) 0%,transparent 45%),
    radial-gradient(ellipse at 90% 95%,rgba(255,158,189,.06) 0%,transparent 45%);
}

/* ===== HEADER ===== */
.hdr{
  background:linear-gradient(135deg,#C94070 0%,#E8628A 40%,#F093B0 100%);
  color:#fff;padding:0 20px;height:var(--header-h);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:200;
  box-shadow:0 4px 24px rgba(201,64,112,.25);
  border-bottom:1px solid rgba(255,255,255,.15);
}
.hdr::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to bottom,rgba(255,255,255,.08),transparent);
  pointer-events:none;
}
.hdr-t{font-size:18px;font-weight:900;letter-spacing:2px;display:flex;align-items:center;gap:8px;position:relative;z-index:1}
.hdr-r{display:flex;align-items:center;gap:12px;position:relative;z-index:1}
.live-dot{
  width:12px;height:12px;background:#FFBFD2;border-radius:50%;
  animation:blink 1.4s infinite;flex-shrink:0;
  box-shadow:0 0 8px rgba(255,158,189,.5);
}
@keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.85)}}
.live-t{font-size:12px;font-weight:700;color:rgba(255,255,255,.9);letter-spacing:.5px}

/* ===== STATS BAR ===== */
.stats{
  background:rgba(255,255,255,.97);border-bottom:1px solid var(--border);
  padding:12px 16px;display:flex;gap:10px;overflow-x:auto;
  backdrop-filter:blur(16px);
  position:sticky;top:var(--header-h);z-index:195;
}
.stats::-webkit-scrollbar{display:none}
.s-card{
  background:linear-gradient(145deg,var(--bg2),#fff);
  border-radius:14px;padding:10px 16px;
  border:1px solid var(--border);min-width:88px;text-align:center;flex:1;
}
.s-num{font-size:26px;font-weight:900;line-height:1.1}
.s-label{font-size:11px;color:var(--text-3);font-weight:500;margin-top:3px;letter-spacing:.3px}
.s-card:first-child .s-num{color:var(--accent)}
.s-card:nth-child(2) .s-num{color:var(--primary)}
.s-card:nth-child(3) .s-num{color:var(--primary-light)}
.s-card:nth-child(4) .s-num{color:var(--primary-dark)}

/* ===== FILTER TABS ===== */
.filter{
  padding:10px 16px;display:flex;gap:8px;
  background:rgba(255,255,255,.97);
  border-bottom:1px solid var(--border);
  position:sticky;top:calc(var(--header-h) + 60px);z-index:190;
  overflow-x:auto;backdrop-filter:blur(16px);
}
.filter::-webkit-scrollbar{display:none}
.ftb{
  white-space:nowrap;border:1.5px solid var(--border);border-radius:22px;
  padding:6px 16px;font-size:13px;cursor:pointer;
  background:#fff;color:var(--text-2);font-weight:600;transition:all .2s;
}
.ftb.active{
  background:linear-gradient(135deg,var(--primary-dark),var(--primary));
  color:#fff;border-color:transparent;
  box-shadow:0 3px 12px rgba(232,98,138,.3);
  transform:translateY(-1px);
}
.ftb:hover:not(.active){border-color:var(--primary);color:var(--primary);background:var(--bg2)}

/* ===== ORDER LIST ===== */
.order-list{padding:16px;display:flex;flex-direction:column;gap:14px;max-width:680px;margin:0 auto}
.o-card{
  background:#fff;border-radius:var(--r);
  box-shadow:var(--sh);overflow:hidden;
  animation:slideIn .3s cubic-bezier(.34,1.4,.64,1);
  border:1.5px solid var(--border);
  transition:transform .2s,box-shadow .2s;
}
.o-card:hover{transform:translateY(-2px);box-shadow:var(--sh2)}
@keyframes slideIn{from{transform:translateY(-20px) scale(.96);opacity:0}to{transform:none;opacity:1}}
.o-card.status-new{border-color:var(--accent);box-shadow:0 4px 20px rgba(255,158,189,.2)}
.o-card.status-accepted{border-color:var(--primary);box-shadow:0 4px 18px rgba(232,98,138,.15)}
.o-card.status-completed{opacity:.6;border-color:var(--border)}

/* 订单卡片顶部状态彩条 */
.o-stripe{height:4px;background-size:200% 100%;animation:stripeFlow 3s linear infinite}
.o-card.status-new .o-stripe{background:linear-gradient(90deg,#FF9EBD,#FFBFD2,#FFD4E5)}
.o-card.status-accepted .o-stripe{background:linear-gradient(90deg,var(--primary-dark),var(--primary),var(--primary-light))}
.o-card.status-completed .o-stripe{background:linear-gradient(90deg,#4CAF9E,#6BC4AD,#9DD9CA)}
@keyframes stripeFlow{0%{background-position:0% 0%}100%{background-position:200% 0%}}

.o-hd{
  background:linear-gradient(to right,var(--bg2),#fff);
  padding:10px 16px;display:flex;align-items:center;
  justify-content:space-between;border-bottom:1px solid var(--border);
}
.o-id{font-size:11px;font-weight:800;color:var(--primary-dark);letter-spacing:2px;font-family:monospace}
.o-time{font-size:11px;color:var(--text-3);font-weight:500}
.o-badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:800;letter-spacing:.3px}
.o-badge.new{background:linear-gradient(135deg,#FF9EBD,#E8628A);color:#fff}
.o-badge.accepted{background:linear-gradient(135deg,var(--primary-dark),var(--primary));color:#fff}
.o-badge.completed{background:linear-gradient(135deg,var(--primary-light),var(--primary));color:#fff}
.o-body{padding:12px 16px}
.o-items{display:flex;flex-direction:column;gap:6px}
.o-item{
  display:flex;align-items:center;gap:10px;padding:7px 10px;
  background:var(--bg2);border-radius:10px;
  border:1px solid var(--border-2);
}
.o-qty{
  background:linear-gradient(135deg,var(--primary-dark),var(--primary));
  color:#fff;border-radius:8px;
  padding:2px 8px;font-size:12px;font-weight:900;min-width:36px;text-align:center;
}
.o-name{font-size:14px;font-weight:700;color:var(--text);flex:1}
.o-price{font-size:14px;font-weight:900;color:var(--primary)}
.o-ft{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;border-top:1px solid var(--border);
  background:linear-gradient(to top,rgba(255,240,245,.6),#fff);
}
.o-total{font-size:17px;font-weight:900;color:var(--primary-dark)}
.o-actions{display:flex;gap:8px;align-items:center}
.o-btn{border:none;border-radius:12px;padding:8px 14px;font-size:13px;font-weight:800;cursor:pointer;transition:all .18s}
.o-btn.accept{
  background:linear-gradient(135deg,var(--primary-dark),var(--primary));
  color:#fff;box-shadow:0 3px 10px rgba(232,98,138,.3);
}
.o-btn.accept:hover{transform:translateY(-1px) scale(1.04);box-shadow:0 4px 16px rgba(232,98,138,.4)}
.o-btn.done{
  background:linear-gradient(135deg,var(--primary),var(--primary-light));
  color:#fff;box-shadow:0 3px 10px rgba(240,147,176,.3);
}
.o-btn.done:hover{transform:translateY(-1px) scale(1.04);box-shadow:0 4px 16px rgba(240,147,176,.4)}
.o-btn.del{
  background:var(--bg2);color:var(--text-2);
  border:1.5px solid var(--border);font-size:12px;padding:8px 10px;
}
.o-btn.del:hover{border-color:var(--primary);color:var(--primary);background:var(--bg2)}

/* ===== EMPTY ===== */
.empty{
  text-align:center;padding:60px 20px;
  color:var(--text-2);font-size:15px;
  display:flex;flex-direction:column;align-items:center;gap:12px;
}
.empty-icon{font-size:56px;opacity:.3}

/* ===== TOAST ===== */
.toast{
  position:fixed;bottom:28px;left:50%;
  transform:translateX(-50%) translateY(80px);
  background:linear-gradient(135deg,#055C4A,#067A5A);
  color:#fff;padding:11px 24px;border-radius:28px;
  font-size:13px;font-weight:700;z-index:9999;opacity:0;
  transition:all .32s cubic-bezier(.34,1.4,.64,1);
  box-shadow:0 6px 28px rgba(5,92,74,.25);
  white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* ===== SOUND BTN ===== */
.sound-btn{
  position:fixed;bottom:24px;right:24px;
  background:linear-gradient(135deg,#fff,var(--bg2));
  border:1.5px solid var(--border);
  border-radius:50%;width:50px;height:50px;
  font-size:20px;cursor:pointer;
  box-shadow:0 4px 16px rgba(6,168,130,.15);
  transition:all .22s;z-index:300;
}
.sound-btn:hover{transform:scale(1.1);border-color:var(--primary);box-shadow:0 6px 20px rgba(6,168,130,.25)}
.sound-btn.off{opacity:.4}

/* ===== RESPONSIVE ===== */
@media(max-width:640px){
  .order-list{padding:12px 10px}
  .hdr{padding:0 14px}
  .stats{top:var(--header-h)}
  .filter{top:calc(var(--header-h) + 56px)}
  .sound-btn{bottom:20px;right:16px;width:46px;height:46px}
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-t">🍽️ 后厨管理台</div>
  <div class="hdr-r">
    <div class="live-dot"></div>
    <div class="live-t" id="conn-status" style="font-size:11px;font-weight:700;color:rgba(255,255,255,.85)">连接中...</div>
  </div>
</div>

<!-- STATS -->
<div class="stats">
  <div class="s-card"><div class="s-num" id="s-new">0</div><div class="s-label">新订单</div></div>
  <div class="s-card"><div class="s-num" id="s-cooking">0</div><div class="s-label">制作中</div></div>
  <div class="s-card"><div class="s-num" id="s-done">0</div><div class="s-label">已完成</div></div>
  <div class="s-card"><div class="s-num" id="s-today">¥0</div><div class="s-label">今日收入</div></div>
</div>

<!-- FILTER -->
<div class="filter">
  <div class="ftb active" data-filter="all" onclick="setFilter('all')">全部</div>
  <div class="ftb" data-filter="new" onclick="setFilter('new')">新订单</div>
  <div class="ftb" data-filter="accepted" onclick="setFilter('accepted')">制作中</div>
  <div class="ftb" data-filter="completed" onclick="setFilter('completed')">已完成</div>
</div>

<!-- ORDER LIST -->
<div class="order-list" id="order-list">
  <div class="empty">
    <div class="empty-icon">🍽️</div>
    <div>暂无订单</div>
    <div style="font-size:12px">有新订单时会自动显示在这里</div>
  </div>
</div>

<!-- SOUND BTN -->
<button class="sound-btn" id="sound-btn" onclick="toggleSound()" title="切换提示音">🔔</button>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// State
let allOrders = {};
let currentFilter = 'all';
let soundEnabled = true;

// Notification sound
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playNotifySound(){
  if(!soundEnabled) return;
  audioCtx.resume().then(()=>{
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.setValueAtTime(880, audioCtx.currentTime);
    osc.frequency.setValueAtTime(1100, audioCtx.currentTime + 0.1);
    osc.frequency.setValueAtTime(1320, audioCtx.currentTime + 0.2);
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.5);
  });
}

// Toast
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

// Toggle sound
function toggleSound(){
  soundEnabled = !soundEnabled;
  const btn = document.getElementById('sound-btn');
  btn.textContent = soundEnabled ? '🔔' : '🔕';
  btn.classList.toggle('off', !soundEnabled);
  showToast(soundEnabled ? '提示音已开启' : '提示音已关闭');
}

// Filter
function setFilter(f){
  currentFilter = f;
  document.querySelectorAll('.ftb').forEach(b=>{
    b.classList.toggle('active', b.dataset.filter === f);
  });
  renderOrders();
}

// Time format
function timeStr(ts){
  const d = new Date(ts);
  const h = String(d.getHours()).padStart(2,'0');
  const m = String(d.getMinutes()).padStart(2,'0');
  return h+':'+m;
}

// Render orders
function renderOrders(){
  const list = document.getElementById('order-list');
  let orders = Object.entries(allOrders)
    .filter(([k,o])=> currentFilter==='all' || o.status===currentFilter)
    .sort((a,b)=>b[1].createdAt - a[1].createdAt);

  if(!orders.length){
    list.innerHTML = `<div class="empty">
      <div class="empty-icon">${currentFilter==='all'?'🍽️':'📋'}</div>
      <div>${currentFilter==='all'?'暂无订单':currentFilter==='new'?'暂无新订单':'暂无'+{accepted:'制作中',completed:'已完成'}[currentFilter]+'订单'}</div>
      <div style="font-size:12px">有新订单时会自动显示在这里</div>
    </div>`;
    return;
  }

  list.innerHTML = orders.map(([id, o])=>`
    <div class="o-card status-${o.status}">
      <div class="o-stripe"></div>
      <div class="o-hd">
        <div class="o-id">#${id.slice(-6).toUpperCase()}</div>
        <div style="display:flex;align-items:center;gap:10px">
          <div class="o-time">${o.createdAt ? timeStr(o.createdAt) : '--:--'}</div>
          <div class="o-badge ${o.status}">${{new:'新订单',accepted:'制作中',completed:'已完成'}[o.status]||o.status}</div>
        </div>
      </div>
      <div class="o-body">
        <div class="o-items">
          ${(o.items||[]).map(i=>`
            <div class="o-item">
              <div class="o-qty">×${i.qty}</div>
              <div class="o-name">${i.name}</div>
              <div class="o-price">¥${(i.price*i.qty).toFixed(1)}</div>
            </div>
          `).join('')}
        </div>
      </div>
      <div class="o-ft">
        <div class="o-total">¥${(o.total||0).toFixed(1)} · ${o.count||0}份</div>
        <div class="o-actions">
          ${o.status==='new' ? `<button class="o-btn accept" onclick="acceptOrder('${id}')">🍳 开始制作</button>` : ''}
          ${o.status==='accepted' ? `<button class="o-btn done" onclick="completeOrder('${id}')">✅ 完成</button>` : ''}
          <button class="o-btn del" onclick="deleteOrder('${id}')">🗑️</button>
        </div>
      </div>
    </div>
  `).join('');
}

// Update stats
function updateStats(){
  const orders = Object.values(allOrders);
  const today = new Date().setHours(0,0,0,0);
  document.getElementById('s-new').textContent = orders.filter(o=>o.status==='new').length;
  document.getElementById('s-cooking').textContent = orders.filter(o=>o.status==='accepted').length;
  document.getElementById('s-done').textContent = orders.filter(o=>o.status==='completed').length;
  const todayTotal = orders.filter(o=>o.status==='completed' && o.createdAt>=today).reduce((a,o)=>a+(o.total||0),0);
  document.getElementById('s-today').textContent = '¥'+todayTotal.toFixed(0);
}

// Firebase actions
function acceptOrder(id){
  DB.ref('orders/'+id).update({status:'accepted'});
  showToast('🍳 开始制作中');
}
function completeOrder(id){
  DB.ref('orders/'+id).update({status:'completed'});
  showToast('✅ 订单已完成');
}
function deleteOrder(id){
  if(!confirm('确定删除此订单？')) return;
  DB.ref('orders/'+id).remove();
  showToast('🗑️ 已删除');
}

// Listen to Firebase
const ordersRef = DB.ref('orders');

// Connection status indicator
function setConnStatus(text, color){
  const el = document.getElementById('conn-status');
  if(el){ el.textContent = text; el.style.color = color||'#fff'; }
}

// Error handler
function onError(error){
  console.error('Firebase error:', error);
  setConnStatus('连接失败', '#FFD700');
  showToast('Firebase连接失败：' + (error.message||'请刷新页面'));
}

// Attach listeners
ordersRef.on('child_added', (snap)=>{
  const val = snap.val();
  const key = snap.key;
  console.log('[Firebase] child_added:', key, val);
  if(!allOrders[key]){
    allOrders[key] = val;
    if(val.status==='new') playNotifySound();
    updateStats();
    renderOrders();
    showToast('📩 收到新订单 #' + key.slice(-6).toUpperCase());
  }
});
ordersRef.on('child_changed', (snap)=>{
  const val = snap.val();
  const key = snap.key;
  console.log('[Firebase] child_changed:', key, val);
  allOrders[key] = val;
  updateStats();
  renderOrders();
});
ordersRef.on('child_removed', (snap)=>{
  const key = snap.key;
  console.log('[Firebase] child_removed:', key);
  delete allOrders[key];
  updateStats();
  renderOrders();
});

// Load existing orders on startup
setConnStatus('连接中...', '#FFD700');
ordersRef.once('value').then(snap=>{
  allOrders = snap.val() || {};
  console.log('[Firebase] Initial load:', allOrders);
  setConnStatus('实时监听中', '#4A9E6B');
  updateStats();
  renderOrders();
}).catch(onError);
</script>
</body>
</html>
