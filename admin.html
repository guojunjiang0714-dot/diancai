<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🍽️ 后厨管理台 - 家常菜点菜系统</title>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyAk4p8G0esWi2-OXyKKxXq_eYPAsgu1adY",
  authDomain: "ordering-and-billing-sys-bc4f3.firebaseapp.com",
  databaseURL: "https://ordering-and-billing-sys-bc4f3-default-rtdb.firebaseio.com",
  projectId: "ordering-and-billing-sys-bc4f3",
  storageBucket: "ordering-and-billing-sys-bc4f3.firebasestorage.app",
  messagingSenderId: "500763684423",
  appId: "1:500763684423:web:70dbe25fef00a99a504b62"
};
firebase.initializeApp(firebaseConfig);
const DB = firebase.database();
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"PingFang SC","Microsoft YaHei","SimSun",sans-serif;background:#FFF5F8;color:#3D1F2D;min-height:100vh;background-image:url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23E8628A' fill-opacity='0.04'%3E%3Cpath d='M50 50c0-5.523 4.477-10 10-10s10 4.477 10 10-4.477 10-10 10c0 5.523-4.477 10-10 10s-10-4.477-10-10 4.477-10 10-10zM10 10c0-5.523 4.477-10 10-10s10 4.477 10 10-4.477 10-10 10c0 5.523-4.477 10-10 10S0 25.523 0 20s4.477-10 10-10zm10 8c4.418 0 8-3.582 8-8s-3.582-8-8-8-8 3.582-8 8 3.582 8 8 8zm40 40c4.418 0 8-3.582 8-8s-3.582-8-8-8-8 3.582-8 8 3.582 8 8 8z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E")}
/* HEADER */
.hdr{background:linear-gradient(160deg,#C94070 0%,#E8628A 50%,#F093B0 100%);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 3px 20px rgba(201,64,112,.25)}
.hdr-t{font-size:22px;font-weight:900;letter-spacing:4px;text-shadow:0 2px 8px rgba(0,0,0,.15)}
.hdr-r{display:flex;align-items:center;gap:12px}
.live-dot{width:12px;height:12px;background:#4A9E6B;border-radius:50%;animation:blink 1.4s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.live-t{font-size:12px;font-weight:700;color:rgba(255,255,255,.85);letter-spacing:1px}
/* STATS BAR */
.stats{background:#fff;border-bottom:2px solid #F5D5E2;padding:12px 20px;display:flex;gap:10px;overflow-x:auto;box-shadow:0 2px 8px rgba(232,98,138,.06)}
.stats::-webkit-scrollbar{display:none}
.s-card{background:linear-gradient(145deg,#FCEEF3,#fff);border-radius:14px;padding:10px 16px;border:1.5px solid #F5D5E2;min-width:90px;text-align:center}
.s-num{font-size:26px;font-weight:900;color:#E8628A}
.s-label{font-size:11px;color:#9B7088;font-weight:600;margin-top:2px;letter-spacing:.5px}
/* FILTER TABS */
.filter{padding:12px 16px;display:flex;gap:8px;background:#fff;border-bottom:2px solid #F5D5E2;position:sticky;top:68px;z-index:190;overflow-x:auto}
.filter::-webkit-scrollbar{display:none}
.ftb{white-space:nowrap;border:1.5px solid #F5D5E2;border-radius:20px;padding:6px 16px;font-size:13px;cursor:pointer;background:#fff;color:#9B7088;font-weight:700;transition:all .18s}
.ftb.active{background:linear-gradient(135deg,#E8628A,#F093B0);color:#fff;border-color:#E8628A;box-shadow:0 3px 10px rgba(232,98,138,.35)}
/* ORDER LIST */
.order-list{padding:16px;display:flex;flex-direction:column;gap:14px;max-width:640px;margin:0 auto}
.o-card{background:#fff;border-radius:18px;border:2px solid #F5D5E2;box-shadow:0 3px 14px rgba(232,98,138,.10);overflow:hidden;animation:slideIn .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes slideIn{from{transform:translateY(-20px) scale(.96);opacity:0}to{transform:none;opacity:1}}
.o-card.status-new{border-color:#E8628A;box-shadow:0 3px 20px rgba(232,98,138,.2)}
.o-card.status-accepted{border-color:#F093B0;box-shadow:0 3px 14px rgba(240,147,176,.2)}
.o-card.status-completed{opacity:.55;border-color:#ddd}
.o-hd{background:#FFF5F8;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #F5D5E2}
.o-id{font-size:11px;font-weight:800;color:#9B7088;letter-spacing:1.5px;font-family:monospace}
.o-time{font-size:11px;color:#9B7088;font-weight:600}
.o-badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:800}
.o-badge.new{background:#E8628A;color:#fff}
.o-badge.accepted{background:#F093B0;color:#fff}
.o-badge.completed{background:#4A9E6B;color:#fff}
.o-body{padding:12px 16px}
.o-items{display:flex;flex-direction:column;gap:6px}
.o-item{display:flex;align-items:center;gap:10px;padding:6px 10px;background:#FFF5F8;border-radius:10px}
.o-qty{background:#E8628A;color:#fff;border-radius:8px;padding:2px 8px;font-size:13px;font-weight:900;min-width:36px;text-align:center}
.o-name{font-size:14px;font-weight:700;color:#3D1F2D;flex:1}
.o-price{font-size:14px;font-weight:900;color:#E8628A}
.o-ft{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-top:1px solid #F5D5E2;background:#FFFAFC}
.o-total{font-size:18px;font-weight:900;color:#C94070}
.o-actions{display:flex;gap:8px}
.o-btn{ border:none;border-radius:12px;padding:7px 14px;font-size:13px;font-weight:800;cursor:pointer;transition:all .18s}
.o-btn.accept{background:linear-gradient(135deg,#E8628A,#F093B0);color:#fff;box-shadow:0 3px 10px rgba(232,98,138,.3)}
.o-btn.accept:hover{transform:scale(1.06);box-shadow:0 4px 14px rgba(232,98,138,.45)}
.o-btn.done{background:linear-gradient(135deg,#4A9E6B,#6BC48F);color:#fff;box-shadow:0 3px 10px rgba(74,158,107,.3)}
.o-btn.done:hover{transform:scale(1.06);box-shadow:0 4px 14px rgba(74,158,107,.45)}
.o-btn.del{background:#fff;color:#E8628A;border:1.5px solid #F5D5E2;font-size:12px}
.o-btn.del:hover{border-color:#E8628A;background:#FFF5F8}
/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:#9B7088;font-size:15px;display:flex;flex-direction:column;align-items:center;gap:12px}
.empty-icon{font-size:56px;opacity:.35}
/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#3D1F2D;color:#fff;padding:10px 22px;border-radius:24px;font-size:14px;font-weight:700;z-index:999;transition:transform .3s;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.toast.show{transform:translateX(-50%) translateY(0)}
/* SOUND BTN */
.sound-btn{position:fixed;bottom:20px;right:20px;background:#fff;border:2px solid #F5D5E2;border-radius:50%;width:48px;height:48px;font-size:20px;cursor:pointer;box-shadow:0 3px 14px rgba(232,98,138,.2);transition:all .18s;z-index:300}
.sound-btn:hover{transform:scale(1.1);border-color:#E8628A}
.sound-btn.off{opacity:.4}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-t">🍽️ 后厨管理台</div>
  <div class="hdr-r">
    <div class="live-dot"></div>
    <div class="live-t">实时监听中</div>
  </div>
</div>

<!-- STATS -->
<div class="stats">
  <div class="s-card"><div class="s-num" id="s-new">0</div><div class="s-label">新订单</div></div>
  <div class="s-card"><div class="s-num" id="s-cooking">0</div><div class="s-label">制作中</div></div>
  <div class="s-card"><div class="s-num" id="s-done">0</div><div class="s-label">已完成</div></div>
  <div class="s-card"><div class="s-num" id="s-today">¥0</div><div class="s-label">今日收入</div></div>
</div>

<!-- FILTER -->
<div class="filter">
  <div class="ftb active" data-filter="all" onclick="setFilter('all')">全部</div>
  <div class="ftb" data-filter="new" onclick="setFilter('new')">新订单</div>
  <div class="ftb" data-filter="accepted" onclick="setFilter('accepted')">制作中</div>
  <div class="ftb" data-filter="completed" onclick="setFilter('completed')">已完成</div>
</div>

<!-- ORDER LIST -->
<div class="order-list" id="order-list">
  <div class="empty">
    <div class="empty-icon">🍽️</div>
    <div>暂无订单</div>
    <div style="font-size:12px">有新订单时会自动显示在这里</div>
  </div>
</div>

<!-- SOUND BTN -->
<button class="sound-btn" id="sound-btn" onclick="toggleSound()" title="切换提示音">🔔</button>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// State
let allOrders = {};
let currentFilter = 'all';
let soundEnabled = true;

// Notification sound
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playNotifySound(){
  if(!soundEnabled) return;
  audioCtx.resume().then(()=>{
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.setValueAtTime(880, audioCtx.currentTime);
    osc.frequency.setValueAtTime(1100, audioCtx.currentTime + 0.1);
    osc.frequency.setValueAtTime(1320, audioCtx.currentTime + 0.2);
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.5);
  });
}

// Toast
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

// Toggle sound
function toggleSound(){
  soundEnabled = !soundEnabled;
  const btn = document.getElementById('sound-btn');
  btn.textContent = soundEnabled ? '🔔' : '🔕';
  btn.classList.toggle('off', !soundEnabled);
  showToast(soundEnabled ? '提示音已开启' : '提示音已关闭');
}

// Filter
function setFilter(f){
  currentFilter = f;
  document.querySelectorAll('.ftb').forEach(b=>{
    b.classList.toggle('active', b.dataset.filter === f);
  });
  renderOrders();
}

// Time format
function timeStr(ts){
  const d = new Date(ts);
  const h = String(d.getHours()).padStart(2,'0');
  const m = String(d.getMinutes()).padStart(2,'0');
  return h+':'+m;
}

// Render orders
function renderOrders(){
  const list = document.getElementById('order-list');
  let orders = Object.entries(allOrders)
    .filter(([k,o])=> currentFilter==='all' || o.status===currentFilter)
    .sort((a,b)=>b[1].createdAt - a[1].createdAt);

  if(!orders.length){
    list.innerHTML = `<div class="empty">
      <div class="empty-icon">${currentFilter==='all'?'🍽️':'📋'}</div>
      <div>${currentFilter==='all'?'暂无订单':currentFilter==='new'?'暂无新订单':'暂无'+{accepted:'制作中',completed:'已完成'}[currentFilter]+'订单'}</div>
      <div style="font-size:12px">有新订单时会自动显示在这里</div>
    </div>`;
    return;
  }

  list.innerHTML = orders.map(([id, o])=>`
    <div class="o-card status-${o.status}">
      <div class="o-hd">
        <div class="o-id">#${id.slice(-6).toUpperCase()}</div>
        <div style="display:flex;align-items:center;gap:10px">
          <div class="o-time">${o.createdAt ? timeStr(o.createdAt) : '--:--'}</div>
          <div class="o-badge ${o.status}">${{new:'新订单',accepted:'制作中',completed:'已完成'}[o.status]||o.status}</div>
        </div>
      </div>
      <div class="o-body">
        <div class="o-items">
          ${(o.items||[]).map(i=>`
            <div class="o-item">
              <div class="o-qty">×${i.qty}</div>
              <div class="o-name">${i.name}</div>
              <div class="o-price">¥${(i.price*i.qty).toFixed(1)}</div>
            </div>
          `).join('')}
        </div>
      </div>
      <div class="o-ft">
        <div class="o-total">¥${(o.total||0).toFixed(1)} · ${o.count||0}份</div>
        <div class="o-actions">
          ${o.status==='new' ? `<button class="o-btn accept" onclick="acceptOrder('${id}')">🍳 开始制作</button>` : ''}
          ${o.status==='accepted' ? `<button class="o-btn done" onclick="completeOrder('${id}')">✅ 完成</button>` : ''}
          <button class="o-btn del" onclick="deleteOrder('${id}')">🗑️</button>
        </div>
      </div>
    </div>
  `).join('');
}

// Update stats
function updateStats(){
  const orders = Object.values(allOrders);
  const today = new Date().setHours(0,0,0,0);
  document.getElementById('s-new').textContent = orders.filter(o=>o.status==='new').length;
  document.getElementById('s-cooking').textContent = orders.filter(o=>o.status==='accepted').length;
  document.getElementById('s-done').textContent = orders.filter(o=>o.status==='completed').length;
  const todayTotal = orders.filter(o=>o.status==='completed' && o.createdAt>=today).reduce((a,o)=>a+(o.total||0),0);
  document.getElementById('s-today').textContent = '¥'+todayTotal.toFixed(0);
}

// Firebase actions
function acceptOrder(id){
  DB.ref('orders/'+id).update({status:'accepted'});
  showToast('🍳 开始制作中');
}
function completeOrder(id){
  DB.ref('orders/'+id).update({status:'completed'});
  showToast('✅ 订单已完成');
}
function deleteOrder(id){
  if(!confirm('确定删除此订单？')) return;
  DB.ref('orders/'+id).remove();
  showToast('🗑️ 已删除');
}

// Listen to Firebase
const ordersRef = DB.ref('orders');
ordersRef.on('child_added', (snap)=>{
  const val = snap.val();
  const key = snap.key;
  if(!allOrders[key]){
    allOrders[key] = val;
    if(val.status==='new') playNotifySound();
    updateStats();
    renderOrders();
  }
});
ordersRef.on('child_changed', (snap)=>{
  const val = snap.val();
  const key = snap.key;
  allOrders[key] = val;
  updateStats();
  renderOrders();
});
ordersRef.on('child_removed', (snap)=>{
  const key = snap.key;
  delete allOrders[key];
  updateStats();
  renderOrders();
});

// Load existing orders on startup
ordersRef.once('value').then(snap=>{
  allOrders = snap.val() || {};
  updateStats();
  renderOrders();
});
</script>
</body>
</html>
